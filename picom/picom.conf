#################################
# DWM low-latency picom profile #
#################################

backend = "xrender";
vsync = true;
unredir-if-possible = true;
use-damage = true;

shadow = true;
shadow-radius = 14;
shadow-offset-x = -8;
shadow-offset-y = -8;
shadow-opacity = 0.22;

fading = true;
fade-delta = 6;
fade-in-step = 0.04;
fade-out-step = 0.04;
fade-exclude = [
  "class_g = 'Rofi'",
  "window_type = 'dock'"
];

inactive-opacity = 0.96;
active-opacity = 1.0;
frame-opacity = 0.92;
inactive-opacity-override = false;
detect-client-opacity = true;

mark-wmwin-focused = true;
mark-ovredir-focused = true;
detect-transient = true;
detect-client-leader = true;

shadow-exclude = [
  "class_g = 'Dmenu'",
  "class_g = 'Rofi'",
  "window_type = 'dock'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];
